<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐢</text></svg>">
    <link rel="stylesheet" href="/assets/css/czerepaha.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .container {
            display: flex;
            min-height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }
        .sidebar {
            width: 200px;
            padding: 2rem;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
        }
        .main-content {
            flex: 1;
            padding: 2rem;
            margin-left: 200px;
            max-width: 800px;
            margin: 0 auto;
        }
        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .menu-item {
            margin-bottom: 1rem;
        }
        .menu-link {
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .menu-link:hover {
            color: #000;
            text-decoration: underline;
        }
        .post-item {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <nav>
                <ul class="menu">
                    <li class="menu-item">
                        <a href="/czerepaha_home" class="menu-link">Архив рассылки</a>
                    </li>
                    <li class="menu-item">
                        <a href="/mentalmodels" class="menu-link">Ментальные модели</a>
                    </li>
                </ul>
            </nav>
        </aside>
        <div class="main-content">
            <header class="header">
                <nav class="nav">
                    <a href="/czerepaha_home" class="nav-link">← Home</a>
                </nav>
            </header>

            <main class="content">
                <article class="post">
                    <header class="post-header">
                        <h1 class="post-title">{{ page.title }}</h1>
                        <div class="post-meta">
                            <time datetime="{{ page.date }}">{{ page.date | date: site.theme_config.date_format }}</time>
                            {% if page.author %}
                            <span class="post-author">by {{ page.author }}</span>
                            {% endif %}
                        </div>
                    </header>

                    <div class="post-content">
                        {{ content }}
                    </div>
                </article>
            </main>

            <footer class="footer">
                <nav class="nav">
                    <a href="/czerepaha_home" class="nav-link">← Back to Home</a>
                </nav>
            </footer>
        </div>
    </div>
</body>
</html>
